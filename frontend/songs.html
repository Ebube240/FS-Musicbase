<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Music Library System</h1>
        <p>Manage Your Songs</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="artists.html">Artists</a>
        <a href="albums.html">Albums</a>
        <a href="songs.html">Songs</a>
    </nav>
    <main>
        <h1>Songs</h1>
        <div class="form-section">
            <div class="form-group">
                <input type="text" id="song_name" placeholder="Song Name">
                <input type="number" id="release_year" placeholder="Release Year">
                <input type="number" id="album_id" placeholder="Album ID">
            </div>
            <div class="form-group">
                <button id="song-action-btn" onclick="createSong()">Create Song</button>
                <button type="button" onclick="resetSongForm()">Cancel</button>
            </div>
        </div>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Song Name</th>
                    <th>Release Year</th>
                    <th>Album ID</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="songTable"></tbody>
        </table>
    </main>
</div>
<script src="js/songs.js"></script>
</body>
</html>
